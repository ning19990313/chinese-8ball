<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中式八球 - tailuge 物理引擎</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="game/favicon.png">
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0f1419; }
    .shell { display: flex; flex-direction: column; height: 100vh; }
    .topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #1a2332;
      border-bottom: 1px solid #243044;
      color: #ecf0f1;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 0.9rem;
      gap: 12px;
    }
    .topbar h1 { font-size: 1.1rem; margin: 0; color: #2ecc71; }
    .topbar a { color: #3498db; text-decoration: none; }
    .topbar a:hover { text-decoration: underline; }
    .rules-mini { color: #95a5a6; font-size: 0.8rem; }
    #game-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <h1>中式八球</h1>
      <span class="rules-mini">
        物理引擎:
        <a href="https://github.com/tailuge/billiards" target="_blank" rel="noopener">tailuge/billiards</a>
        (GPL-3.0) · 开球打1号 · 4球碰库 · 最小号球 · 高低杆侧旋
      </span>
      <span class="rules-mini">
        空格击球 · 方向键瞄准/加塞 ·
        <a href="online.html">在线联机</a>
      </span>
    </header>
    <iframe
      id="game-frame"
      title="中式八球游戏"
      src="game/index.html?ruletype=chinese8ball&amp;lod=3"
      allowfullscreen
    ></iframe>
  </div>
</body>
</html>
